name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package release
        run: |
          mkdir -p obsidian-opencode-wsl
          cp main.js manifest.json styles.css obsidian-opencode-wsl/
          zip -r obsidian-opencode-wsl.zip obsidian-opencode-wsl/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            obsidian-opencode-wsl.zip
            main.js
            manifest.json
            styles.css
          make_latest: true
          body: |
            ## Installation

            ### Via BRAT
            1. Install [BRAT](https://obsidian.md/plugins?id=obsidian42-brat)
            2. Run `BRAT: Add a beta plugin for testing`
            3. Enter `https://github.com/emmet24/obsidian-opencode-wsl`

            ### Manual
            Download `obsidian-opencode-wsl.zip` and extract to `<vault>/.obsidian/plugins/opencode-wsl/`